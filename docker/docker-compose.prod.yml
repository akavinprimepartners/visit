version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: akavin-postgres
    restart: always
    environment:
      POSTGRES_USER: akavin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akavin123}
      POSTGRES_DB: akavin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - akavin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akavin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akavin-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - akavin-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: akavin-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - akavin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: akavin-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - akavin-network
    environment:
      - OLLAMA_HOST=0.0.0.0

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: akavin-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://akavin:${POSTGRES_PASSWORD:-akavin123}@postgres:5432/akavin
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OLLAMA_URL=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY}
      - ENV=production
      - DEBUG=False
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../shared:/app/shared
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - akavin-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: akavin-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://api.visit.akavin.online
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - akavin-network

  nginx:
    image: nginx:alpine
    container_name: akavin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - frontend
      - backend
    networks:
      - akavin-network

networks:
  akavin-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data:
  ollama_data:
