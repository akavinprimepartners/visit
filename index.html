<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CardScan · Organizer</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        /* --- reset & layout --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 30px 32px;
        }
        h1 {
            font-weight: 600;
            font-size: 26px;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        h1 i { color: #2a7de1; }
        .subhead {
            color: #4a5b6e;
            margin-bottom: 28px;
            border-left: 4px solid #2a7de1;
            padding-left: 16px;
            font-weight: 400;
            font-size: 15px;
            background: #f0f5ff;
            border-radius: 0 12px 12px 0;
            line-height: 1.5;
            padding: 12px 18px;
        }
        .scan-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            background: #f9faff;
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 30px;
        }
        .upload-card {
            flex: 1 1 200px;
            background: white;
            border-radius: 20px;
            padding: 18px 16px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #e9edf4;
            text-align: center;
        }
        .upload-card label {
            display: block;
            font-weight: 500;
            color: #1f2a3f;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .upload-card .preview {
            width: 100%;
            height: 110px;
            background: #eef2f8;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7a8f;
            font-size: 13px;
            overflow: hidden;
            margin-bottom: 14px;
            border: 1px dashed #b7c4d4;
        }
        .upload-card .preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .upload-card input[type="file"] { display: none; }
        .upload-btn {
            background: #eef3fa;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            color: #1f3a5f;
            cursor: pointer;
            transition: 0.15s;
            font-size: 13px;
        }
        .upload-btn:hover { background: #dce4ef; }
        .tag-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin: 16px 0 8px;
        }
        .tag-section label {
            font-weight: 500;
            color: #1f2a3f;
            font-size: 14px;
        }
        .tag-input-group {
            display: flex;
            flex: 1 1 220px;
            gap: 6px;
        }
        .tag-input-group input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d2dcec;
            border-radius: 60px;
            font-size: 14px;
            background: white;
            transition: 0.15s;
        }
        .tag-input-group input:focus {
            border-color: #2a7de1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(42,125,225,0.15);
        }
        .tag-input-group button {
            background: #2a7de1;
            border: none;
            color: white;
            padding: 0 18px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
            white-space: nowrap;
        }
        .tag-input-group button:hover { background: #1b62b5; }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0 4px;
        }
        .tag-badge {
            background: #e7edf8;
            padding: 5px 14px 5px 16px;
            border-radius: 60px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #12243d;
        }
        .tag-badge i {
            cursor: pointer;
            color: #6a7f9b;
            font-size: 12px;
            transition: 0.1s;
        }
        .tag-badge i:hover { color: #c13e3e; }
        .editable-fields {
            background: white;
            padding: 20px 22px;
            border-radius: 24px;
            margin: 18px 0 28px;
            border: 1px solid #e4ebf5;
        }
        .field-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            margin-bottom: 14px;
        }
        .field-group {
            flex: 1 1 160px;
            min-width: 130px;
        }
        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #5f738c;
            margin-bottom: 4px;
        }
        .field-group input, .field-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dae1ec;
            border-radius: 14px;
            font-size: 14px;
            background: #fafcff;
            transition: 0.12s;
        }
        .field-group input:focus, .field-group textarea:focus {
            border-color: #2a7de1;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(42,125,225,0.08);
        }
        .field-group textarea {
            resize: vertical;
            min-height: 42px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin: 8px 0 20px;
        }
        .action-bar .left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #eef3fa;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            color: #1f2a3f;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .btn-primary {
            background: #1f3a5f;
            color: white;
        }
        .btn-primary:hover { background: #122b47; }
        .btn-success {
            background: #1f8b4c;
            color: white;
        }
        .btn-success:hover { background: #15723d; }
        .btn-outline {
            background: transparent;
            border: 1px solid #c8d4e5;
        }
        .btn-outline:hover { background: #eef3fa; }
        .btn-danger {
            background: #d45a5a;
            color: white;
        }
        .btn-danger:hover { background: #b84141; }
        .table-wrap {
            overflow-x: auto;
            margin-top: 18px;
            border-radius: 20px;
            border: 1px solid #e4ebf5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }
        th {
            background: #f2f6fd;
            color: #1f2a3f;
            font-weight: 600;
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid #d7e0ec;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #e9eff7;
            vertical-align: middle;
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
        }
        .tag-sm {
            background: #dce6f3;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 500;
            color: #1a2f4a;
        }
        .empty-state {
            padding: 40px 10px;
            text-align: center;
            color: #7b8ba0;
        }
        .excel-hint {
            font-size: 13px;
            color: #3f5a78;
            background: #e9f0fa;
            border-radius: 60px;
            padding: 4px 18px;
        }
        @media (max-width: 650px) {
            .container { padding: 18px; }
            .scan-grid { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-id-card"></i> CardScan · Organizer</h1>
    <div class="subhead">
        <i class="fas fa-tags" style="margin-right: 10px;"></i> Upload front & back · Add tags · Edit fields · <strong>Export to GitHub (Excel)</strong>
    </div>

    <!-- Upload area -->
    <div class="scan-grid">
        <div class="upload-card">
            <label><i class="fas fa-camera"></i> Front</label>
            <div class="preview" id="frontPreview"><i class="fas fa-image" style="opacity:0.4;"></i></div>
            <input type="file" id="frontInput" accept="image/*" />
            <button class="upload-btn" onclick="document.getElementById('frontInput').click()"><i class="fas fa-upload"></i> Upload front</button>
        </div>
        <div class="upload-card">
            <label><i class="fas fa-camera-retro"></i> Back</label>
            <div class="preview" id="backPreview"><i class="fas fa-image" style="opacity:0.4;"></i></div>
            <input type="file" id="backInput" accept="image/*" />
            <button class="upload-btn" onclick="document.getElementById('backInput').click()"><i class="fas fa-upload"></i> Upload back</button>
        </div>
        <div style="flex:1; min-width:180px;">
            <div style="background:white; border-radius:20px; padding:12px 16px; height:100%; display:flex; flex-direction:column; justify-content:center; border:1px solid #e9edf4;">
                <div style="font-size:14px; color:#1f3a5f; font-weight:500;"><i class="fas fa-layer-group"></i> Scanned cards</div>
                <div style="font-size:32px; font-weight:300; color:#1f3a5f;" id="cardCounter">0</div>
                <div style="font-size:13px; color:#5f738c;">tagged & stored</div>
            </div>
        </div>
    </div>

    <!-- Tags -->
    <div class="tag-section">
        <label><i class="fas fa-tag"></i> Tags</label>
        <div class="tag-input-group">
            <input type="text" id="tagInput" placeholder="e.g. conference, VIP, sales" value="business" />
            <button id="addTagBtn"><i class="fas fa-plus"></i> Add</button>
        </div>
        <button class="btn btn-outline" id="clearTagsBtn" style="padding:6px 16px;"><i class="fas fa-undo-alt"></i> Reset</button>
    </div>
    <div class="tags-container" id="tagsContainer">
        <span class="tag-badge">business <i class="fas fa-times" data-tag="business"></i></span>
    </div>

    <!-- Editable fields -->
    <div class="editable-fields">
        <div style="display: flex; gap: 6px; align-items: center; margin-bottom: 10px;">
            <i class="fas fa-pen" style="color:#2a7de1;"></i>
            <span style="font-weight:500;">Edit card data</span>
            <span style="color:#6b7a8f; font-size:13px; margin-left:6px;">(fields are editable before storing)</span>
        </div>
        <div class="field-row">
            <div class="field-group"><label>Full name</label><input id="fieldName" value="John Doe" placeholder="Name" /></div>
            <div class="field-group"><label>Company</label><input id="fieldCompany" value="Acme Inc." placeholder="Company" /></div>
            <div class="field-group"><label>Email</label><input id="fieldEmail" value="john@acme.com" placeholder="Email" /></div>
        </div>
        <div class="field-row">
            <div class="field-group"><label>Phone</label><input id="fieldPhone" value="+1 234 567 890" placeholder="Phone" /></div>
            <div class="field-group"><label>Title</label><input id="fieldTitle" value="Sales Director" placeholder="Title" /></div>
            <div class="field-group"><label>Website</label><input id="fieldWebsite" value="acme.com" placeholder="Website" /></div>
        </div>
        <div class="field-row">
            <div class="field-group"><label>Address</label><textarea id="fieldAddress" rows="1" placeholder="Address">123 Business St.</textarea></div>
        </div>
    </div>

    <!-- Actions -->
    <div class="action-bar">
        <div class="left">
            <button class="btn btn-primary" id="storeBtn"><i class="fas fa-save"></i> Store card</button>
            <button class="btn btn-outline" id="clearFieldsBtn"><i class="fas fa-broom"></i> Clear fields</button>
        </div>
        <div>
            <button class="btn btn-success" id="exportExcelBtn"><i class="fas fa-file-excel"></i> Export to GitHub</button>
            <span class="excel-hint"><i class="fas fa-code-branch"></i> commits to repo</span>
        </div>
    </div>

    <!-- Stored cards table -->
    <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight:500; color:#1f2a3f;"><i class="fas fa-list-ul"></i> Stored cards</span>
        <button class="btn btn-danger" id="clearAllBtn" style="padding:4px 14px; font-size:12px;"><i class="fas fa-trash"></i> Clear all</button>
    </div>
    <div class="table-wrap">
        <table id="cardsTable">
            <thead><tr><th>#</th><th>Name</th><th>Company</th><th>Email</th><th>Tags</th><th>Front</th><th>Back</th></tr></thead>
            <tbody id="tableBody">
                <tr><td colspan="7" class="empty-state">No cards stored. Upload & store your first card.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    (function() {
        // ---- state ----
        let cards = [];
        let nextId = 1;
        let currentTags = new Set(['business']);

        // image data
        let frontImageData = null;
        let backImageData = null;

        // DOM refs
        const frontInput = document.getElementById('frontInput');
        const backInput = document.getElementById('backInput');
        const frontPreview = document.getElementById('frontPreview');
        const backPreview = document.getElementById('backPreview');
        const tagInput = document.getElementById('tagInput');
        const addTagBtn = document.getElementById('addTagBtn');
        const clearTagsBtn = document.getElementById('clearTagsBtn');
        const tagsContainer = document.getElementById('tagsContainer');
        const fieldName = document.getElementById('fieldName');
        const fieldCompany = document.getElementById('fieldCompany');
        const fieldEmail = document.getElementById('fieldEmail');
        const fieldPhone = document.getElementById('fieldPhone');
        const fieldTitle = document.getElementById('fieldTitle');
        const fieldWebsite = document.getElementById('fieldWebsite');
        const fieldAddress = document.getElementById('fieldAddress');
        const storeBtn = document.getElementById('storeBtn');
        const clearFieldsBtn = document.getElementById('clearFieldsBtn');
        const exportExcelBtn = document.getElementById('exportExcelBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const tableBody = document.getElementById('tableBody');
        const cardCounter = document.getElementById('cardCounter');

        // ---- helper: render tags ----
        function renderTags() {
            tagsContainer.innerHTML = '';
            if (currentTags.size === 0) {
                const empty = document.createElement('span');
                empty.textContent = 'No tags';
                empty.style.color = '#8a9bb0';
                empty.style.fontSize = '14px';
                tagsContainer.appendChild(empty);
                return;
            }
            currentTags.forEach(tag => {
                const badge = document.createElement('span');
                badge.className = 'tag-badge';
                badge.innerHTML = `${tag} <i class="fas fa-times" data-tag="${tag}"></i>`;
                badge.querySelector('i').addEventListener('click', function(e) {
                    currentTags.delete(this.dataset.tag);
                    renderTags();
                });
                tagsContainer.appendChild(badge);
            });
        }

        // ---- add tag ----
        function addTagFromInput() {
            const raw = tagInput.value.trim();
            if (!raw) return;
            raw.split(',').map(s => s.trim()).filter(s => s.length > 0).forEach(t => currentTags.add(t));
            tagInput.value = '';
            renderTags();
        }

        function resetTags() {
            currentTags = new Set(['business']);
            renderTags();
        }

        // ---- image preview ----
        function handleFileInput(input, previewEl, setDataFn) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                setDataFn(dataUrl);
                previewEl.innerHTML = `<img src="${dataUrl}" alt="preview">`;
            };
            reader.readAsDataURL(file);
        }

        frontInput.addEventListener('change', function() {
            handleFileInput(this, frontPreview, (data) => { frontImageData = data; });
        });
        backInput.addEventListener('change', function() {
            handleFileInput(this, backPreview, (data) => { backImageData = data; });
        });

        // ---- clear fields ----
        function clearFields() {
            fieldName.value = '';
            fieldCompany.value = '';
            fieldEmail.value = '';
            fieldPhone.value = '';
            fieldTitle.value = '';
            fieldWebsite.value = '';
            fieldAddress.value = '';
        }

        // ---- store card ----
        function storeCard() {
            const name = fieldName.value.trim() || 'Unnamed';
            const company = fieldCompany.value.trim() || '';
            const email = fieldEmail.value.trim() || '';
            const phone = fieldPhone.value.trim() || '';
            const title = fieldTitle.value.trim() || '';
            const website = fieldWebsite.value.trim() || '';
            const address = fieldAddress.value.trim() || '';
            const tags = Array.from(currentTags);
            if (tags.length === 0) tags.push('uncategorized');

            cards.push({
                id: nextId++,
                name,
                company,
                email,
                phone,
                title,
                website,
                address,
                tags,
                frontImg: frontImageData || null,
                backImg: backImageData || null,
            });
            renderTable();
            updateCounter();
        }

        // ---- render table ----
        function renderTable() {
            if (cards.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-state">No cards stored. Upload & store your first card.</td></tr>`;
                return;
            }
            let html = '';
            cards.forEach((card, idx) => {
                const tagHtml = card.tags.map(t => `<span class="tag-sm">${t}</span>`).join(' ');
                const frontImgHtml = card.frontImg ? `<img src="${card.frontImg}" style="width:40px; height:30px; object-fit:cover; border-radius:6px;">` : '—';
                const backImgHtml = card.backImg ? `<img src="${card.backImg}" style="width:40px; height:30px; object-fit:cover; border-radius:6px;">` : '—';
                html += `<tr>
                    <td>${idx+1}</td>
                    <td><strong>${card.name}</strong></td>
                    <td>${card.company}</td>
                    <td>${card.email}</td>
                    <td><div class="tag-group">${tagHtml}</div></td>
                    <td>${frontImgHtml}</td>
                    <td>${backImgHtml}</td>
                </tr>`;
            });
            tableBody.innerHTML = html;
        }

        function updateCounter() {
            cardCounter.textContent = cards.length;
        }

        // ---- EXPORT TO GITHUB (Excel) ----
        async function exportToGitHub() {
            if (cards.length === 0) {
                alert('No cards to export. Store at least one card.');
                return;
            }

            // 1. Build Excel data
            const data = cards.map(c => ({
                'Name': c.name,
                'Company': c.company,
                'Email': c.email,
                'Phone': c.phone,
                'Title': c.title,
                'Website': c.website,
                'Address': c.address,
                'Tags': c.tags.join(', '),
                'Front Image': c.frontImg ? 'yes' : 'no',
                'Back Image': c.backImg ? 'yes' : 'no',
            }));

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Cards');
            const wbArray = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

            // 2. Convert to base64
            let binary = '';
            const bytes = new Uint8Array(wbArray);
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const base64Content = btoa(binary);

            // 3. Get GitHub credentials from user
            const token = prompt('Enter your GitHub Personal Access Token (with repo scope):');
            if (!token) return;
            const owner = prompt('Repository owner (username or organization):');
            if (!owner) return;
            const repo = prompt('Repository name:');
            if (!repo) return;
            const filePath = prompt('File path (e.g., data/cards.xlsx):', 'visiting_cards.xlsx');
            if (!filePath) return;

            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;

            // 4. Check if file exists (get SHA)
            let sha = null;
            try {
                const res = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const json = await res.json();
                    sha = json.sha;
                }
            } catch (e) { /* ignore */ }

            // 5. Prepare commit payload
            const payload = {
                message: 'Update visiting cards data',
                content: base64Content,
                branch: 'main'  // change if your default branch is different
            };
            if (sha) payload.sha = sha;

            // 6. Send PUT request
            try {
                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(`✅ File committed to GitHub!\n${result.content.html_url}`);
                } else {
                    const err = await response.json();
                    alert('❌ Upload failed: ' + (err.message || 'Unknown error'));
                }
            } catch (err) {
                alert('❌ Network error: ' + err.message);
            }
        }

        // ---- clear all cards ----
        function clearAllCards() {
            if (cards.length === 0) return;
            if (confirm('Delete all stored cards?')) {
                cards = [];
                renderTable();
                updateCounter();
            }
        }

        // ---- event binding ----
        addTagBtn.addEventListener('click', addTagFromInput);
        tagInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addTagFromInput(); } });
        clearTagsBtn.addEventListener('click', resetTags);
        clearFieldsBtn.addEventListener('click', clearFields);
        storeBtn.addEventListener('click', storeCard);
        exportExcelBtn.addEventListener('click', exportToGitHub);
        clearAllBtn.addEventListener('click', clearAllCards);

        // initial render
        renderTags();
        renderTable();
        updateCounter();
    })();
</script>
</body>
</html>
